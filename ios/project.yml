name: SilverCareiOS
options:
  bundleIdPrefix: com.silvercare
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.8"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
packages: {}
schemes:
  SilverCareiOS:
    build:
      targets:
        SilverCareiOS: all
    test:
      targets:
        - SilverCareiOSTests
        - SilverCareiOSUITests
targets:
  SilverCareCore:
    type: framework
    platform: iOS
    sources:
      - path: Sources/SilverCareCore
    dependencies:
      - sdk: libz.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.silvercare.aiassistant.core
        GENERATE_INFOPLIST_FILE: YES
  SilverCareiOS:
    type: application
    platform: iOS
    sources:
      - path: SilverCareiOS
      - path: ../app/src/main/assets
        name: WebAssets
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.silvercare.aiassistant.ios
        INFOPLIST_FILE: SilverCareiOS/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 887TZ78HJ5
    dependencies:
      - target: SilverCareCore
      - sdk: WebKit.framework
      - sdk: AVFoundation.framework
      - sdk: CoreMotion.framework
      - sdk: UserNotifications.framework
    postBuildScripts:
      - name: Embed optional native runtimes
        script: bash "$SRCROOT/Tools/embed_native_runtime_artifacts.sh"
        basedOnDependencyAnalysis: false
      - name: Embed private DashScope config
        script: bash "$SRCROOT/Tools/embed_private_dashscope_config.sh"
        basedOnDependencyAnalysis: false
  SilverCareiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SilverCareCoreTests
      - path: SilverCareiOSTests
    dependencies:
      - target: SilverCareCore
      - target: SilverCareiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.silvercare.aiassistant.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SilverCareiOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SilverCareiOS"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 887TZ78HJ5
  SilverCareiOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests/SilverCareiOSUITests
    dependencies:
      - target: SilverCareiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.silvercare.aiassistant.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: ""
        TEST_HOST: ""
        TEST_TARGET_NAME: SilverCareiOS
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 887TZ78HJ5
